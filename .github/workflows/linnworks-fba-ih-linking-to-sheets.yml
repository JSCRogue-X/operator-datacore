name: Linnworks FBA IH Linking → Sheets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fba-ih-linking:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      LINNWORKS_APP_ID:        ${{ secrets.LINNWORKS_APP_ID }}
      LINNWORKS_APP_SECRET:    ${{ secrets.LINNWORKS_APP_SECRET }}
      LINNWORKS_INSTALL_TOKEN: ${{ secrets.LINNWORKS_INSTALL_TOKEN }}
      LINNWORKS_LOCATION_KEY:  ${{ secrets.LINNWORKS_LOCATION_KEY }}
      GOOGLE_SERVICE_ACCOUNT_KEY_FILE: ./spincare-sheets-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Write Google service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}' > spincare-sheets-key.json

      - name: Linnworks FBA IH Linking → Sheets
        run: npx tsx src/cli/linnworks-fba-ih-linking-to-sheets.ts
