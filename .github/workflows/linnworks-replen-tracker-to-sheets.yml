name: Linnworks REPLEN → Ogden Replen Tracking

on:
  workflow_dispatch:  # Run manually from GitHub Actions

permissions:
  contents: read

jobs:
  replen-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      LINNWORKS_APP_ID:       ${{ secrets.LINNWORKS_APP_ID }}
      LINNWORKS_APP_SECRET:   ${{ secrets.LINNWORKS_APP_SECRET }}
      LINNWORKS_INSTALL_TOKEN: ${{ secrets.LINNWORKS_INSTALL_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_KEY_FILE: ./spincare-sheets-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write Google service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}' > spincare-sheets-key.json

      - name: Linnworks REPLEN → Sheets
        run: npx tsx src/cli/linnworks-replen-tracker-to-sheets.ts
