name: SoStocked → OOS Tracking

on:
  workflow_dispatch:  # Run manually first to verify, then add a schedule below
  # schedule:
  #   - cron: '0 7 * * 1'  # Every Monday at 7am UTC — uncomment once working

permissions:
  contents: read

jobs:
  sostocked:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SOSTOCKED_EMAIL:                 ${{ secrets.SOSTOCKED_EMAIL }}
      SOSTOCKED_PASSWORD:              ${{ secrets.SOSTOCKED_PASSWORD }}
      GOOGLE_SERVICE_ACCOUNT_KEY_FILE: ./spincare-sheets-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Write Google service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}' > spincare-sheets-key.json

      - name: SoStocked → Sheets
        run: npx tsx src/cli/sostocked-to-sheets.ts

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sostocked-debug-screenshot
          path: /tmp/sostocked-debug.png
          retention-days: 3
